name: Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Run tests
        run: npm run test -- --no-watch --browsers=ChromeHeadless
        continue-on-error: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/ngx-datawindow/
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/ngx-datawindow/

      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Version: $TAG"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('dist/ngx-datawindow/package.json', 'utf8'));
            pkg.version = '$TAG';
            fs.writeFileSync('dist/ngx-datawindow/package.json', JSON.stringify(pkg, null, 2));
            console.log('Set version to', pkg.version);
          "

      - name: Publish to npm
        run: npm publish dist/ngx-datawindow/ --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}